name: flutter_l10n_automator
description: Automatically extract hardcoded strings and generate l10n files for Flutter apps
version: 1.0.0
homepage: https://github.com/yourusername/flutter_l10n_automator

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.2
  path: ^1.8.3
  glob: ^2.1.2

dev_dependencies:
  lints: ^3.0.0

executables:
  flutter_l10n_automator: flutter_l10n_automator
  cleanup: cleanup
  l10n_undo: undo
